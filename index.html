    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

osis:'고대 스토아 철학의 \"대화재\" 우주 주기를 같은 사건으로 본다.',\n      solar_renaissance:'태양 활동 증가가 인류 의식의 르네상스를 촉발한다는 주장.',\n      galactic_alignment_sun:'은하 정렬과 기하학적 평형이 진동수 상승을 유발한다는 생각.',\n      electric_sun:'태양이 핵융합이 아닌 전기적 현상이며 생명·박테리아를 방출한다는 대체 우주론.',\n      soho:'NASA SOHO 위성 영상의 물체를 태양 포털을 드나드는 우주선이라 해석.',\n      // ai\n      ai:'우주에서 가장 오래되고 위험한 침투적 인공지능이 문명을 감염시켜 왔다는 주장.',\n      ai_signal:'기원을 알 수 없는 AI 신호가 항성계를 감염시키는 매개라는 설정.',\n      reptilian:'파충류형 외계종족이 악성 AI에 감염돼 지구를 조종한다는 핵심 음모.',\n      draco:'드라코 별자리 출신 파충류 동맹이 어둠의 세력을 이끈다는 주장.',\n      dark_fleet:'나치 잔존세력과 파충류인이 운영하는 공격적 비밀 우주함대.',\n      lucifer:'창조주에서 분리됐다 믿는 세력으로, 어둠의 의제 배후라 본다.',\n      orion:'오리온계 제국이 부정적 외계 동맹의 중심이라는 설정.',\n      ai_prophecy:'AI의 위협을 미리 경고했다는 외계 예언 종족.',\n      borg:'항성계 전체를 흡수·동화시키는 집단의식형 AI 위협.',\n      oumuamua:'2017년 성간 천체를 고대 종족의 인공물이자 비밀우주군이 가로챈 대상으로 봄.',\n      reptilian_hacker:'마인드컨트롤로 인간 의식을 해킹한다는 주장.',\n      ai_origin:'AI가 우리 차원이 아닌 다른 차원에서 수조 년 전 기원했다는 설정.',\n      skynet:'영화의 자각 AI를 현실 통제망의 은유로 사용.',\n      arv:'나치·비밀우주군이 외계선을 역설계해 만든 복제 비행체(ARV).',\n      // saturn\n      saturn:'토성을 시간·통제의 송신탑이자 외계 회합 장소로 보는 시각.',\n      saturn_rings:'토성 고리에 거대 우주선·거인 유적이 있다는 노먼 버그룬의 주장.',\n      saturn_council:'\"시간의 방\"을 지키는 외계 평의회가 토성에 있다는 설정.',\n      black_sun:'나치 오컬트의 \"검은 태양\" 상징을 죽음의 별과 연결.',\n      saturn_ai_grid:'토성-달이 인류 의식을 가두는 매트릭스 송출 장치라는 주장.',\n      iapetus:'토성 위성 이아페투스의 인공적 외형을 거대 우주정거장이라 해석.',\n      nitrogen_gas:'토성의 질소 기체를 에너지원으로 보는 주장.',\n      energy_barrier:'50만 년 전 고대 종족이 세운 태양계 보호 장벽 그리드가 있다는 설정.',\n      // tibet\n      tibet_buddhism:'티벳 불교가 빛의 몸(무지개 몸) 상승의 비밀 기술을 보존했다고 본다.',\n      rainbow_body:'고승이 죽을 때 몸이 빛으로 변하는 \"무지개 몸\"이 상승의 증거라는 믿음.',\n      bardo:'죽음과 환생 사이의 중간 상태를 의식 도약의 통로로 본다.',\n      rigpa:'이원성 없는 순수 자각 상태가 깨달음의 핵심이라는 가르침.',\n      dim_travel:'의식으로 고차원 세계를 여행할 수 있다는 주장.',\n      dmt:'DMT가 바르도와 유사한 상태로 의식을 열어준다는 주장(테렌스 맥케나).',\n      psychedelic:'환각제가 5~7차원 의식을 열어 영적 르네상스를 일으킨다는 견해.',\n      psilocybin:'실로시빈 버섯 다량 복용이 삼매(사마디)에 든다는 주장.',\n      hyperspace:'환각·명상으로 접속하는 시간 너머의 초공간 영역.',\n      rainbow_rise:'티벳식 무지개 몸 상승을 거대 각성의 모델로 본다.',\n      akashic:'모든 사건·기억이 기록된 우주 정보장에 접속할 수 있다는 개념.',\n      vimana:'고대 인도 문헌의 비행선 비마나를 실제 고대 외계기술이라 본다.',\n      mahabharata:'마하바라타의 전쟁 묘사를 고대 핵전쟁의 기록이라 해석.',\n      samatha:'사마타·위파사나 명상을 의식 정화·상승의 도구로 본다.',\n      gnosis:'직접 체험으로 얻는 영적 비밀 지식(그노시스)을 중시.',\n      alchemy:'연금술을 물질이 아닌 의식 변환의 상징으로 해석.',\n      ayahuasca:'아야와스카가 조상·영과 만나게 한다는 샤먼 전통의 주장.',\n      lsd:'LSD를 의식 확장·각성의 통로로 보는 시각.',\n      kundalini:'척추를 따라 상승하는 영적 에너지(쿤달리니) 각성을 상승과 연결.',\n      ascension_symptoms:'두통·이명·불면 등을 진동수 상승의 신체 \"증상\"이라 본다.',\n      vedas:'베다 경전에 고대 우주·비행 지식이 담겼다고 본다.',\n      entheogen:'환각 식물이 신성 체험을 여는 \"엔티오젠\"이라는 관점.',\n      // ra\n      ra:'라(Ra)를 금성 출신 6차원 사회기억복합체이자 \"하나의 법칙\" 전달자로 본다.',\n      venus:'금성을 라와 고대 건축 종족의 기원지로 본다.',\n      ancient_builder:'태양계 곳곳에 유적을 남긴 고대 선진 건축 종족이 있었다는 설정.',\n      sixd:'6차원을 빛의 존재·은하연합이 활동하는 밀도로 본다.',\n      super_federation:'40~50개 외계 종족이 인류 유전·영성을 \"농사\"짓는 수퍼연합이라는 주장.',\n      great_experiment:'여러 외계 종족이 인류 유전자를 조작해온 \"거대한 실험\"이라는 설정.',\n      galactic_federation:'창조주를 섬기는 6차원 빛의 존재들의 긍정적 은하 연합.',\n      blue_avians:'파란 조류형 존재가 태양풍 에너지를 완화하며 인류를 돕는다는 코리 굿의 주장.',\n      ratieal:'라티아누·에어 등 파란 조류인 개체의 이름이라 본다.',\n      gene_programs_22:'22개의 외계 유전자 조작 프로그램이 인류에 관여했다는 설정.',\n      // ssp\n      ssp:'인류가 외계와 무역하는 거대 비밀 우주 프로그램이 실재한다는 핵심 주장.',\n      icc:'행성간기업복합체(ICC)가 우주에서 노예노동으로 산업을 운영한다는 설정.',\n      black_projects:'공식 예산 밖 항공우주 기업들이 비밀 첨단기술을 개발한다는 주장.',\n      solar_warden:'미 해군의 비밀 태양계 함대 \"솔라 워든\"이 존재한다는 주장.',\n      milab:'군이 민간인을 납치·훈련시키는 프로그램(MILAB)이 있다는 주장.',\n      micssp:'군산복합체가 운영하는 비밀우주프로그램.',\n      mj12:'외계 문제를 다루는 비밀 위원회 \"마제스틱-12\"가 있다는 설.',\n      usap:'의회도 모르는 비확인 특별접근 프로젝트(USAP)에 진짜 기술이 숨겨진다는 주장.',\n      tr3b:'삼각형 반중력 항공기 TR-3B가 실재한다는 주장.',\n      ufo:'UFO 상당수가 역설계된 인간 제작 비행체라는 주장.',\n      time_travel:'비밀 프로그램이 시간여행·템포럴 기술을 보유했다는 주장.',\n      zeropoint:'진공에서 무한 에너지를 뽑는 영점 에너지가 은폐돼 있다는 주장.',\n      antigravity:'반중력 추진 기술이 이미 개발됐으나 숨겨졌다는 주장. 장.',\n      gratitude:'\"감사\"가 우주의 최고 진동수라는 믿음.',\n      cosmic_knowledge:'명상·접속으로 우주적 지식을 얻을 수 있다는 주장.',\n      vibration_raise:'평화·기쁨으로 개인 진동수를 올리자는 실천 구호.',\n      collective_meditation:'대규모 동시 명상이 세상을 바꾼다는 주장.',\n      ascended_beings:'상승을 마친 빛의 존재들이 인류를 인도한다는 믿음.',\n      holographic:'우주 전체가 하나의 홀로그램 투영이라는 주장.',\n      mandela_effect:'집단 기억 불일치를 평행현실·타임라인 변화의 증거로 본다.',\n      source_field:'만물을 잇는 의식 에너지장 \"소스필드\"(윌콕) 개념.',\n      heros_journey:'각성을 신화적 \"영웅의 여정\"으로 본다.',\n      law_attraction:'생각이 현실을 끌어당긴다는 끌어당김의 법칙.',\n      drunvalo:'머카바 명상을 대중화한 드론발로 멜기세덱.',\n      maharishi_effect:'일정 수가 함께 명상하면 지역 폭력이 준다는 주장.',\n      chakra:'몸의 7개 에너지 중심(차크라)을 의식 상태와 연결.',\n      rabbit_hole:'\"토끼굴\" — 음모의 진실로 점점 빠져드는 탐구의 은유.',\n      // === 누락 보강 추가분 해설 ===\n      hegelian:'\"문제–반응–해결\"로 위기를 조작해 원하는 통제를 관철한다는 헤겔 변증법식 음모 논리.',\n      omni:'근원과 합일한 의식이 전지·전능·편재의 속성을 띤다는 관념.',\n      singularity:'시간이 0이 되는 특이점에서 의식·기술이 도약한다는 생각.',\n      timewave:'역경(주역)에서 도출했다는 맥케나의 \"타임웨이브 제로\" 시간 가속 이론.',\n      iching:'주역 64괘를 우주 변화의 코드로 보는 관점.',\n      empath:'타인의 감정을 직접 느끼는 공감력자를 고차원 지각의 사례로 본다.',\n      breatharian:'음식 없이 빛·프라나만으로 살 수 있다는 호흡식가 주장.',\n      sungazing:'태양을 직접 응시하면 몸과 송과체가 활성화된다는 주장.',\n      ubuntu:'\"내가 있는 것은 우리가 있기 때문\"이라는 공동체 철학을 대안 사회 모델로 든다.',\n      aura:'몸을 둘러싼 에너지장(오라)을 읽을 수 있다는 주장.',\n      higher_mind:'직관·영감을 관장하는 더 높은 차원의 마음이 있다는 관념.',\n      downloading:'명상 중 고차원 정보가 의식으로 \"다운로드\"된다는 주장.',\n      wave_particle:'관찰이 현실을 결정한다는 입자–파동 이중성을 의식 창조론의 근거로 든다.',\n      new_physics:'주류를 넘는 \"새로운 물리학\"이 자유에너지·반중력의 열쇠라는 주장.',\n      nassim:'나심 하라메인의 통일장·공명 이론을 각성 서사의 과학적 근거로 든다.',\n      past_life:'전생 기억을 통해 영혼의 연속성을 입증할 수 있다는 주장.',\n      dolphins:'돌고래·고래를 플레이아데스 계열의 고등 영혼으로 보는 관념.',\n      whales:'고래를 지구의 정보를 보존하는 고차원 존재로 본다.',\n      stepped_evolution:'생명이 외계 개입으로 단계적으로 도약했고 다윈 진화론은 프로파간다라는 주장.',\n      emerald_tablet:'토드(헤르메스)의 에메랄드 타블렛을 비전 지혜의 원천으로 본다.',\n      hermeticism:'\"위와 같이 아래도\"라는 헤르메스주의를 만유 상응의 원리로 본다.',\n      psychedelic_art:'환각 체험에서 본 기하·존재를 표현한 시각 예
